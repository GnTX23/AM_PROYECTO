<ion-header>
  <ion-toolbar color="warning">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/productos"></ion-back-button>
    </ion-buttons>
    <ion-title>Mi Carrito</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list>
    <ion-item *ngFor="let item of carrito">
      <ion-label>
        <h2>{{ item.nombre }}</h2>
        <p>Cantidad: {{ item.cantidad }}</p>
      </ion-label>
      <ion-note slot="end">${{ item.precio * item.cantidad }}</ion-note>
    </ion-item>
  </ion-list>

  <div class="total-area">
    <h2>Total: ${{ total }}</h2>
    <ion-button expand="block" color="warning" routerLink="/pago">
      Proceder al Pago
    </ion-button>
  </div>
</ion-content>

<ion-header>
  <ion-toolbar color="warning">
    <ion-title>{{ producto.nombre }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="cerrar()">
        <ion-icon name="close-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <img [src]="producto.imagen" class="detalle-img" />

  <ion-card>
    <ion-card-header>
      <ion-card-title>{{ producto.nombre }}</ion-card-title>
      <ion-card-subtitle class="precio">${{ producto.precio }}</ion-card-subtitle>
    </ion-card-header>

    <ion-card-content>
      <p class="descripcion">{{ producto.descripcion }}</p>

      <ion-list lines="none">
        <ion-item>
          <ion-icon name="person-outline" slot="start" color="warning"></ion-icon>
          <ion-label>
            <p>Vendedor</p>
            <h3>{{ producto.vendedor }}</h3>
          </ion-label>
        </ion-item>

        <ion-item>
          <ion-icon name="school-outline" slot="start" color="warning"></ion-icon>
          <ion-label>
            <p>Aula</p>
            <h3>{{ producto.aula }}</h3>
          </ion-label>
        </ion-item>
      </ion-list>

      <ion-button expand="block" color="success" (click)="contactarWhatsapp()">
        <ion-icon name="logo-whatsapp" slot="start"></ion-icon>
        Contactar por WhatsApp
      </ion-button>
    </ion-card-content>
  </ion-card>

</ion-content>

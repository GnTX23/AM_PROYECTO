<ion-content [fullscreen]="true" class="login-content">
  <div class="login-container">

    <div class="logo-area">
      <div class="uni-logo">
        <img src="assets/chat.png" alt="UTMA" class="logo-img"/>
      </div>
      <h1 class="app-title">UTMarket</h1>
      <p class="subtitle">Mercado Universitario UTMA</p>
    </div>

    <div class="form-card">
      <h2>Iniciar Sesión</h2>

      <ion-item lines="none" class="input-item">
        <ion-icon name="person-outline" slot="start" color="warning"></ion-icon>
        <ion-input placeholder="Usuario" [(ngModel)]="usuario" type="text"></ion-input>
      </ion-item>

      <ion-item lines="none" class="input-item">
        <ion-icon name="lock-closed-outline" slot="start" color="warning"></ion-icon>
        <ion-input placeholder="Contraseña" [(ngModel)]="password" type="password"></ion-input>
      </ion-item>

      <p class="quien-eres">¿Quién eres?</p>

      <div class="role-buttons">
        <ion-button expand="block" class="btn-vendedor" (click)="entrar('vendedor')">
          <ion-icon name="storefront-outline" slot="start"></ion-icon>
          Vendedor
        </ion-button>
        <ion-button expand="block" class="btn-usuario" (click)="entrar('usuario')">
          <ion-icon name="person-outline" slot="start"></ion-icon>
          Usuario
        </ion-button>
      </div>
      <div class="register-area">
  <p>¿No tienes cuenta?</p>
  <ion-button expand="block" fill="outline" class="btn-registro" routerLink="/registro">
    <ion-icon name="person-add-outline" slot="start"></ion-icon>
    Registrarse
  </ion-button>
</div>
    </div>

  </div>
</ion-content>

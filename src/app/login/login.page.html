<ion-content [fullscreen]="true" class="login-content">
  <div class="login-container">

    <div class="logo-area">
      <h1 class="app-title">UTMarket</h1>
      <p class="subtitle">Mercado universitario</p>
    </div>

    <div class="form-card">
      <h2>Iniciar Sesión</h2>

      <ion-item lines="full">
        <ion-label position="floating">Nombre de usuario</ion-label>
        <ion-input type="text" [(ngModel)]="usuario"></ion-input>
      </ion-item>

      <ion-item lines="full">
        <ion-label position="floating">Contraseña</ion-label>
        <ion-input type="password" [(ngModel)]="password"></ion-input>
      </ion-item>

      <p class="quien-eres">¿Quién eres?</p>

      <div class="role-buttons">
        <ion-button expand="block" fill="outline" (click)="entrar('vendedor')">
          🛒 Vendedor
        </ion-button>
        <ion-button expand="block" (click)="entrar('usuario')">
          👤 Usuario
        </ion-button>
      </div>
    </div>

  </div>
</ion-content>

<ion-header>
  <ion-toolbar color="warning">
    <ion-title>UTMarket 🛒</ion-title>
    <ion-buttons slot="end">
      <ion-button routerLink="/carrito">
        <ion-icon name="cart-outline"></ion-icon>
      </ion-button>
      <ion-button routerLink="/perfil-user">
        <ion-icon name="person-circle-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-grid>
    <ion-row>
      <ion-col size="6" *ngFor="let p of productos">
        <ion-card (click)="verProducto(p)">
          <img [src]="p.imagen" alt="producto"/>
          <ion-card-header>
            <ion-card-title>{{ p.nombre }}</ion-card-title>
            <ion-card-subtitle>${{ p.precio }}</ion-card-subtitle>
          </ion-card-header>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
